<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimondo Adventure | Tanzania & Zanzibar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-light text-warm font-sans antialiased overflow-x-hidden flex flex-col min-h-screen pt-24">

    <div id="kimondo-header"></div>

    <section id="hero-safari" class="relative min-h-[70vh] md:min-h-[50vh] flex items-center justify-center overflow-hidden w-full pt-24 pb-16">
        
        <div class="absolute inset-0 z-0 bg-black">
            <img src="https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=2070&auto=format&fit=crop" class="w-full h-full object-cover opacity-60 transform scale-110 hover:scale-100 transition-transform duration-[20s] ease-out" alt="Tanzania Safari Landscape" />
            
            <div class="absolute inset-0 bg-gradient-to-b from-black/90 via-black/50 to-forest/90"></div>
        </div>

        <div class="relative z-10 text-center w-full max-w-5xl mx-auto px-4 sm:px-6 flex flex-col items-center mt-10 reveal active">
            
            <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 mb-8 shadow-xl">
                <span class="w-2 h-2 rounded-full bg-golden animate-pulse"></span>
                <span class="text-xs md:text-sm uppercase tracking-[0.2em] text-white font-bold">Tanzania Mainland</span>
            </div>
            
            <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-serif font-bold text-white mb-6 tracking-tight drop-shadow-2xl leading-[1.1]">
                Experience the <br class="hidden sm:block">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-golden to-amber-200 italic font-light">Wild Heart of Africa</span>
            </h1>
            
            <p class="text-lg md:text-xl text-white/90 max-w-2xl mx-auto font-light leading-relaxed mb-12 drop-shadow-md">
                Embark on an unforgettable journey through the Serengeti, Ngorongoro Crater, and beyond. Witness the majesty of nature up close with our expert guides.
            </p>

            <div class="flex flex-wrap justify-center gap-5">
                <a href="#safari-packages" class="bg-golden hover:bg-amber-400 text-dark font-bold px-8 py-4 rounded-full transition-all duration-300 flex items-center gap-3 shadow-[0_0_20px_rgba(245,166,35,0.4)] transform hover:-translate-y-1">
                    <i class="fa-solid fa-binoculars text-lg"></i> View Safaris
                </a>
                <a href="#custom-safari" class="bg-white/10 hover:bg-white/20 px-8 py-4 rounded-full transition-all duration-300 text-white flex items-center gap-3 backdrop-blur-md border border-white/20 transform hover:-translate-y-1">
                    <i class="fa-solid fa-map-location-dot text-lg"></i> Custom Expedition
                </a>
            </div>
            
        </div>

        <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce hidden md:block z-10">
            <div class="w-8 h-12 rounded-full border-2 border-white/30 flex items-center justify-center p-2 backdrop-blur-sm">
                <div class="w-1 h-3 bg-golden rounded-full"></div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-forest to-transparent z-0"></div>
    </section>


    <script src="script.js"></script>
</body>
</html>
